<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact — RepAnchor</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="description" content="Get in touch with the RepAnchor team - questions, feedback, or support.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14213D; --paper: #F5F6F2; --card: #ffffff; --line: #E2E4DE;
    --gold: #E8A33D; --muted: #6B7280; --coral: #D64545; --coral-light: #FBE7E5;
    --teal: #2D9C8A; --teal-light: #E1F5F0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: "IBM Plex Sans", -apple-system, sans-serif; line-height: 1.55; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 60px 24px; }
  .brand-mark { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 28px; }
  .brand-mark span { font-family: "Fraunces", Georgia, serif; font-size: 22px; font-weight: 600; }
  h1 { font-family: "Fraunces", Georgia, serif; font-size: 26px; font-weight: 700; text-align: center; margin: 0 0 8px; }
  p.lead { text-align: center; color: var(--muted); font-size: 14px; margin: 0 0 30px; }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 28px 26px; box-shadow: 0 1px 2px rgba(20,33,61,0.05); margin-bottom: 20px; }
  .direct-email { text-align: center; font-size: 15px; }
  .direct-email a { color: var(--ink); font-weight: 700; text-decoration: none; }
  .direct-email a:hover { text-decoration: underline; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 4px; }
  input, textarea { width: 100%; font-family: inherit; font-size: 14px; border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; margin-bottom: 14px; }
  textarea { min-height: 110px; resize: vertical; }
  input:focus, textarea:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  button { width: 100%; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: none; border-radius: 7px; padding: 12px; background: var(--ink); color: #fff; }
  button:hover { background: #0d1730; }
  button:disabled { background: #a3a8b5; cursor: default; }
  .error { font-size: 13px; color: var(--coral); background: var(--coral-light); border-radius: 7px; padding: 10px 12px; margin-bottom: 14px; display: none; }
  .success { font-size: 13px; color: var(--teal); background: var(--teal-light); border-radius: 7px; padding: 12px; display: none; text-align: center; }
  .back { display: block; text-align: center; font-size: 13px; color: var(--muted); text-decoration: none; margin-top: 16px; }

  .site-footer { border-top: 1px solid #E2E4DE; margin-top: 40px; padding: 22px 24px; }
  .footer-inner { max-width: 1040px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
  .footer-brand { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6B7280; }
  .footer-links { display: flex; gap: 16px; flex-wrap: wrap; }
  .footer-links a { font-size: 12px; color: #6B7280; text-decoration: none; }
  .footer-links a:hover { color: #14213D; text-decoration: underline; }
  .footer-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6B7280; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2D9C8A; display: inline-block; }

  a, button, input, textarea, select { transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease; }
  button:active:not(:disabled) { transform: scale(0.98); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .wrap { animation: fadeIn 0.35s ease; }

  h1, h2, h3, h4 { letter-spacing: -0.01em; }
  .panel, .review-card, .price-card, .feature-card { transition: box-shadow 0.18s ease, transform 0.18s ease; }
  .panel:hover, .review-card:hover, .price-card:hover, .feature-card:hover { box-shadow: 0 4px 16px rgba(20,33,61,0.08); transform: translateY(-1px); }

  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand-mark">
    <svg width="30" height="30" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="17" cy="17" r="16" fill="#14213D"/>
      <circle cx="17" cy="9" r="2" fill="none" stroke="#E8A33D" stroke-width="1.6"/>
      <line x1="17" y1="11" x2="17" y2="20" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="13" y1="14.5" x2="21" y2="14.5" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M9.5,18 Q9.5,23 14,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M24.5,18 Q24.5,23 20,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="10" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="13.25" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="16.5" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="19.75" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="23" cy="28.3" r="1" fill="#E8A33D"/>
    </svg>
    <span>RepAnchor</span>
  </div>

  <h1>Get in touch</h1>
  <p class="lead">Questions, feedback, or need a hand? We read every message.</p>

  <div class="panel">
    <p class="direct-email">Prefer email directly? <a href="mailto:repanchorapp@gmail.com">repanchorapp@gmail.com</a></p>
  </div>

  <div class="panel">
    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox">Thanks — we'll get back to you soon.</div>

    <form id="contactForm">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Jane Smith" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="jane@example.com" required>

      <label for="message">Message</label>
      <textarea id="message" placeholder="How can we help?" required></textarea>

      <button type="submit" id="submitBtn">Send message</button>
    </form>
  </div>

  <a href="/" class="back">&larr; Back to home</a>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');
  errorBox.style.display = 'none';
  successBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const body = {
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    message: document.getElementById('message').value.trim()
  };

  try {
    const res = await fetch('/api/contact-us', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(r => r.json());

    if (res.ok) {
      successBox.style.display = 'block';
      document.getElementById('contactForm').reset();
    } else {
      errorBox.textContent = res.error;
      errorBox.style.display = 'block';
    }
  } catch (err) {
    errorBox.textContent = 'Something went wrong. Please try again, or email us directly.';
    errorBox.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Send message';
});
</script>
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <svg width="18" height="18" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="16" fill="#14213D"/>
        <circle cx="17" cy="9" r="2" fill="none" stroke="#E8A33D" stroke-width="1.8"/>
        <line x1="17" y1="11" x2="17" y2="20" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
        <line x1="13" y1="14.5" x2="21" y2="14.5" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
        <path d="M9.5,18 Q9.5,23 14,24" fill="none" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
        <path d="M24.5,18 Q24.5,23 20,24" fill="none" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>&copy; 2026 RepAnchor &middot; v1.0</span>
    </div>
    <div class="footer-links">
      <a href="/support.html">Support</a>
      <a href="/contact.html">Contact</a>
      <a href="/terms.html">Terms</a>
      <a href="/privacy.html">Privacy</a>
    </div>
    <a href="/status.html" class="footer-status" style="text-decoration:none;">
      <span class="status-dot"></span> All systems operational
    </a>
  </div>
</footer>
</body>
</html>
