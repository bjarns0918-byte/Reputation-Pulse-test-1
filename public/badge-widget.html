<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rating badge</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ink: #14213D; --gold: #E8A33D; --muted: #6B7280; --line: #E2E4DE; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "IBM Plex Sans", -apple-system, sans-serif; background: transparent; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 14px; max-width: 260px;
  }
  .badge .mark { flex-shrink: 0; }
  .badge .stars { font-family: "Fraunces", Georgia, serif; font-weight: 700; font-size: 18px; color: var(--gold); line-height: 1; }
  .badge .biz { font-size: 12px; font-weight: 600; color: var(--ink); margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge .foot { font-size: 10px; color: var(--muted); }
  .badge .foot a { color: var(--muted); text-decoration: none; }
  .badge .foot a:hover { text-decoration: underline; }
  .empty { font-size: 12px; color: var(--muted); padding: 10px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--line); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 2px;
  }
</style>
</head>
<body>
<div id="out"><span class="spinner"></span></div>

<script>
const params = new URLSearchParams(window.location.search);
const businessId = params.get('id');

async function loadBadge() {
  const out = document.getElementById('out');
  if (!businessId) {
    out.innerHTML = '<p class="empty">Missing business ID.</p>';
    return;
  }
  try {
    const res = await fetch('/api/public/badge/' + encodeURIComponent(businessId)).then(r => r.json());
    if (!res.ok || res.avgRating === null) {
      out.innerHTML = '<p class="empty">No rating data yet.</p>';
      return;
    }
    out.innerHTML = `
      <div class="badge">
        <svg class="mark" width="26" height="26" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="17" cy="17" r="16" fill="#14213D"/>
          <circle cx="17" cy="9" r="2" fill="none" stroke="#E8A33D" stroke-width="1.6"/>
      <line x1="17" y1="11" x2="17" y2="20" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="13" y1="14.5" x2="21" y2="14.5" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M9.5,18 Q9.5,23 14,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M24.5,18 Q24.5,23 20,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="10" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="13.25" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="16.5" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="19.75" cy="28.3" r="1" fill="#E8A33D"/>
      <circle cx="23" cy="28.3" r="1" fill="#E8A33D"/>
        </svg>
        <div>
          <p class="biz">${res.businessName}</p>
          <span class="stars">${res.avgRating} ★</span>
          <div class="foot">Powered by <a href="/" target="_blank">RepAnchor</a></div>
        </div>
      </div>
    `;
  } catch (err) {
    out.innerHTML = '<p class="empty">Couldn\'t load rating.</p>';
  }
}

loadBadge();
</script>
</body>
</html>
