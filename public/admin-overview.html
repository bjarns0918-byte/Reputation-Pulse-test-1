<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin overview — RepAnchor</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="description" content="Internal admin overview of all RepAnchor customer accounts.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14213D; --paper: #F5F6F2; --card: #ffffff; --line: #E2E4DE;
    --gold: #E8A33D; --muted: #6B7280; --coral: #D64545; --coral-light: #FBE7E5;
    --teal: #2D9C8A; --teal-light: #E1F5F0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: "IBM Plex Sans", -apple-system, sans-serif; line-height: 1.5; }
  a, button, input, textarea, select { transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
  .brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .brand-mark { display: flex; align-items: center; gap: 12px; }
  .brand h1 { font-family: "Fraunces", Georgia, serif; font-size: 22px; font-weight: 600; margin: 0; }
  .back { font-size: 13px; color: var(--muted); text-decoration: none; }
  .stat-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 130px; }
  .stat-card .num { font-family: "Fraunces", Georgia, serif; font-size: 26px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; font-size: 13px; }
  th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:last-child td { border-bottom: none; }
  .status-pill { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 10px; }
  .status-active { background: var(--teal-light); color: var(--teal); }
  .status-pending { background: #FBF0DC; color: #8a5a10; }
  .status-canceled { background: var(--coral-light); color: var(--coral); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot-yes { background: var(--teal); }
  .dot-no { background: var(--line); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-mark">
      <svg width="28" height="28" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="16" fill="#14213D"/>
        <circle cx="17" cy="9" r="2" fill="none" stroke="#E8A33D" stroke-width="1.6"/>
        <line x1="17" y1="11" x2="17" y2="20" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="13" y1="14.5" x2="21" y2="14.5" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9.5,18 Q9.5,23 14,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M24.5,18 Q24.5,23 20,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="10" cy="28.3" r="1" fill="#E8A33D"/>
        <circle cx="13.25" cy="28.3" r="1" fill="#E8A33D"/>
        <circle cx="16.5" cy="28.3" r="1" fill="#E8A33D"/>
        <circle cx="19.75" cy="28.3" r="1" fill="#E8A33D"/>
        <circle cx="23" cy="28.3" r="1" fill="#E8A33D"/>
      </svg>
      <h1>Admin overview</h1>
    </div>
    <a href="/" class="back">&larr; Back to dashboard</a>
  </div>

  <div class="stat-row" id="statRow"></div>
  <div id="tableWrap"></div>
</div>

<script>
async function load() {
  const res = await fetch('/api/admin/businesses').then(r => r.json());
  if (!res.ok) {
    document.getElementById('tableWrap').innerHTML = `<div class="empty">${res.error || 'Admin access only.'}</div>`;
    return;
  }

  const businesses = res.businesses;
  const active = businesses.filter(b => b.subscriptionStatus === 'active').length;
  const connected = businesses.filter(b => b.googleConnected).length;

  document.getElementById('statRow').innerHTML = `
    <div class="stat-card"><div class="num">${businesses.length}</div><div class="label">Total accounts</div></div>
    <div class="stat-card"><div class="num">${active}</div><div class="label">Active subscriptions</div></div>
    <div class="stat-card"><div class="num">${connected}</div><div class="label">Google connected</div></div>
  `;

  if (businesses.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">No customer accounts yet.</div>';
    return;
  }

  const statusClass = { active: 'status-active', pending: 'status-pending', canceled: 'status-canceled' };

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr><th>Business</th><th>Email</th><th>Plan</th><th>Status</th><th>Google</th><th>Last synced</th><th>Team</th><th>Signed up</th></tr>
      </thead>
      <tbody>
        ${businesses.map(b => `
          <tr>
            <td>${b.businessName}</td>
            <td>${b.email}</td>
            <td>${b.billingPlan || 'monthly'}</td>
            <td><span class="status-pill ${statusClass[b.subscriptionStatus] || 'status-pending'}">${b.subscriptionStatus}</span></td>
            <td><span class="dot ${b.googleConnected ? 'dot-yes' : 'dot-no'}"></span>${b.googleConnected ? 'Connected' : 'Not connected'}</td>
            <td>${b.lastSyncedAt ? new Date(b.lastSyncedAt).toLocaleDateString() : '&mdash;'}</td>
            <td>${b.teamMemberCount}</td>
            <td>${new Date(b.createdAt).toLocaleDateString()}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

load();
</script>
</body>
</html>
