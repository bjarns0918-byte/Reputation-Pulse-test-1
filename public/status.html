<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Status — RepAnchor</title>
<meta name="description" content="Current system status for RepAnchor.">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --ink: #14213D; --paper: #F5F6F2; --muted: #6B7280; --line: #E2E4DE; --teal: #2D9C8A; --teal-light: #E1F5F0; --gold: #E8A33D; }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: "IBM Plex Sans", -apple-system, sans-serif; line-height: 1.6; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 60px 24px; }
  .brand-mark { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 28px; }
  .brand-mark span { font-family: "Fraunces", Georgia, serif; font-size: 22px; font-weight: 600; }
  h1 { font-family: "Fraunces", Georgia, serif; font-size: 26px; font-weight: 700; text-align: center; margin: 0 0 8px; }
  .overall { text-align: center; font-size: 14px; color: var(--teal); font-weight: 600; margin: 0 0 32px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); display: inline-block; }
  .status-row { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; }
  .status-row span.name { font-size: 14px; font-weight: 500; }
  .status-row span.ok { font-size: 12px; font-weight: 600; color: var(--teal); background: var(--teal-light); padding: 3px 10px; border-radius: 10px; }
  .back { display: block; text-align: center; font-size: 13px; color: var(--muted); text-decoration: none; margin-top: 24px; }

  a, button, input, textarea, select { transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease; }
  button:active:not(:disabled) { transform: scale(0.98); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .wrap { animation: fadeIn 0.35s ease; }
  h1, h2, h3, h4 { letter-spacing: -0.01em; }
  .status-row { transition: box-shadow 0.18s ease, transform 0.18s ease; }
  .status-row:hover { box-shadow: 0 4px 16px rgba(20,33,61,0.08); transform: translateY(-1px); }

  .site-footer { border-top: 1px solid #E2E4DE; margin-top: 40px; padding: 22px 24px; }
  .footer-inner { max-width: 1040px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
  .footer-brand { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6B7280; }
  .footer-links { display: flex; gap: 16px; flex-wrap: wrap; }
  .footer-links a { font-size: 12px; color: #6B7280; text-decoration: none; }
  .footer-links a:hover { color: #14213D; text-decoration: underline; }
  .footer-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6B7280; text-decoration: none; }
  .status-dot-small { width: 7px; height: 7px; border-radius: 50%; background: #2D9C8A; display: inline-block; }

  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand-mark">
    <svg width="30" height="30" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="17" cy="17" r="16" fill="#14213D"/>
      <circle cx="17" cy="9" r="2" fill="none" stroke="#E8A33D" stroke-width="1.6"/>
      <line x1="17" y1="11" x2="17" y2="20" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="13" y1="14.5" x2="21" y2="14.5" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M9.5,18 Q9.5,23 14,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M24.5,18 Q24.5,23 20,24" fill="none" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span>RepAnchor</span>
  </div>

  <h1>System status</h1>
  <p class="overall"><span class="status-dot"></span> All systems operational</p>

  <div class="status-row"><span class="name">Dashboard & app</span><span class="ok">Operational</span></div>
  <div class="status-row"><span class="name">Google review sync</span><span class="ok">Operational</span></div>
  <div class="status-row"><span class="name">Billing & payments</span><span class="ok">Operational</span></div>
  <div class="status-row"><span class="name">Email delivery</span><span class="ok">Operational</span></div>

  <a href="/" class="back">&larr; Back to home</a>
</div>
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <svg width="18" height="18" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="16" fill="#14213D"/>
        <circle cx="17" cy="9" r="2" fill="none" stroke="#E8A33D" stroke-width="1.8"/>
        <line x1="17" y1="11" x2="17" y2="20" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
        <line x1="13" y1="14.5" x2="21" y2="14.5" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
        <path d="M9.5,18 Q9.5,23 14,24" fill="none" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
        <path d="M24.5,18 Q24.5,23 20,24" fill="none" stroke="#E8A33D" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>&copy; 2026 RepAnchor &middot; v1.0</span>
    </div>
    <div class="footer-links">
      <a href="/support.html">Support</a>
      <a href="/contact.html">Contact</a>
      <a href="/terms.html">Terms</a>
      <a href="/privacy.html">Privacy</a>
    </div>
    <a href="/status.html" class="footer-status">
      <span class="status-dot-small"></span> All systems operational
    </a>
  </div>
</footer>
</body>
</html>
